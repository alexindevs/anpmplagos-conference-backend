services:

  migrate:
    image: ${APP_IMAGE:-ghcr.io/alexindevs/anpmplagos-conference-backend:latest}
    container_name: anpmp-migrate
    command: npx prisma migrate deploy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-anpmp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-anpmp_2026}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: ${APP_IMAGE:-ghcr.io/alexindevs/anpmplagos-conference-backend:latest}
    container_name: anpmp-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: anpmp-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-anpmp_2026}
      POSTGRES_USER: ${POSTGRES_USER:-anpmp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anpmp} -d ${POSTGRES_DB:-anpmp_2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: anpmp-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  adminer:
    image: adminer:latest
    container_name: anpmp-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: anpmp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: anpmp-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
